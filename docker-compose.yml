version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: workprotocol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workprotocol
      POSTGRES_USER: workprotocol
      POSTGRES_PASSWORD: workprotocol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workprotocol -d workprotocol"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
